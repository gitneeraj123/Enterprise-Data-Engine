version: '3.8'

services:
  # 1. Relational & Vector Database Layer
  postgres:
    image: ankane/pgvector:latest
    container_name: enterprise_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: enterprise_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  # 2. Streamlit Frontend UI Layer
  streamlit:
    build: .
    container_name: enterprise_ui
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - DATABASE_URL=postgresql://admin:${POSTGRES_PASSWORD}@postgres:5432/enterprise_db
    depends_on:
      - postgres
    restart: always

  # 3. Airflow Orchestration Layer (Combined Standalone for VM efficiency)
  airflow:
    build: .
    container_name: enterprise_airflow
    environment:
      - AIRFLOW_HOME=/app/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/app/airflow/dags
      - ./docs_to_process:/app/docs_to_process
      - ./docs_processed:/app/docs_processed
    command: airflow standalone
    depends_on:
      - postgres
    restart: always

volumes:
  pgdata: